name: emisora_flutter
description: "App profesional para emisora de radio con streaming y redes sociales"
publish_to: 'none'
version: 1.0.0+10

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # --- Audio (Configuración para Radio Inmortal) ---
  just_audio: ^0.9.38
  just_audio_background: ^0.0.1-beta.13
  audio_session: ^0.1.16

  # --- Red ---
  connectivity_plus: ^5.0.2

  # --- Interfaz y Animaciones ---
  animated_background: ^2.0.0
  font_awesome_flutter: ^10.7.0

  # --- Funcionalidad ---
  url_launcher: ^6.2.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  # Herramienta para generar el icono de la app
  flutter_launcher_icons: ^0.13.1

# Configuración del icono para la Play Store
flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "lib/assets/logo.png"
  min_sdk_android: 21

flutter:
  uses-material-design: true

  assets:
    - lib/assets/logo.png
    - lib/assets/radio_cover.jpg
    - lib/assets/locutor.png
    - lib/assets/estudio.png